<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Customer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
</head>
<body>
    
<div class="container mt-5 ">
    <div class="row">
        <!-- Table Section -->
        <div class="col-md-6 ">
          <h3 class="text-center mb-3">Customer List</h3>
          <table class="table table-bordered table-striped">
            <thead class="table-dark text-center">
              <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody class="text-center" id="tableCustomers">
            </tbody>
          </table>
          <button type="submit" onclick="loadTable()" class="btn btn-primary w-50 ">
            Load Table
          </button>
        </div>

        <!-- Form Section -->
        <div class="col-md-6 border p-4 rounded shadow">
          <h2 class="text-center mb-4">Update Customer</h2>

          <label for="name">Name:</label>
          <input type="text" id="name" name="name" class="form-control mb-3" />

          <label for="address">Address:</label>
          <input type="text" id="address" name="address" class="form-control mb-3" />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" class="form-control mb-3" />

          <label for="phoneNumber">Phone Number:</label>
          <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control mb-4" />

          <button type="submit" onclick="updateCustomer()" class="btn btn-primary w-50">
            Update Customer
          </button>
        </div>
    </div>
</div>





    <script src="app.js"></script>
</body>
</html>
